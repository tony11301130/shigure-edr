    data_dir: ./sample-data

  wazuh:
    enabled: false
    # api_url: https://wazuh.example:55000
    # username_env: WAZUH_USERNAME
    # password_env: WAZUH_PASSWORD
    # alerts_json_path: /var/ossec/logs/alerts/alerts.json

  fleet_osquery:
    enabled: false
    # api_url: https://fleet.example
    # token_env: FLEET_API_TOKEN

  velociraptor:
    enabled: false
    # api_url: https://velociraptor.example:8000
    # config_path: /etc/velociraptor/api.config.yaml

  falco:
    enabled: false
